name: 'Test'

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
  pull_request:
    paths-ignore:
      - '**.md'

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - 'ubuntu-24.04'
          - 'ubuntu-latest'
          - 'macos-latest'
          - 'windows-latest'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - run: bun install

      - name: Run prettier
        if: startsWith(matrix.os, 'ubuntu-24.04')
        run: bun run format:check

      - name: Run eslint
        if: startsWith(matrix.os, 'ubuntu-24.04')
        run: bun run lint

      - name: Run build
        if: startsWith(matrix.os, 'ubuntu-24.04')
        run: bun run build

      - run: bun test --coverage --coverage-reporter=lcov --coverage-dir=coverage

      - uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5

  test-action:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - 'ubuntu-latest'
          - 'macos-latest'
          - 'windows-latest'
        hugo-version:
          - 'latest'
          - '0.139.0'
        extended:
          - true
          - false
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Hugo
        uses: ./
        with:
          hugo-version: ${{ matrix.hugo-version }}
          extended: ${{ matrix.extended }}

      - name: Verify Hugo
        run: hugo version
